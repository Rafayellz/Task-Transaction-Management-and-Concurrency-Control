<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySQL Triggers Demonstration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #ffffff;
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        h1 {
            text-align: center;
            margin-bottom: 50px;
            color: #ffffff;
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .section {
            background: rgba(22, 33, 62, 0.6);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .section h2 {
            color: #ffffff;
            margin-bottom: 30px;
            font-size: 2rem;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .image-block {
            text-align: center;
        }

        .video-wrapper {
            position: relative;
            display: inline-block;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.3);
            max-width: 100%;
        }

        .video-wrapper video {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            width: 100%;
        }

        .label {
            font-weight: 600;
            margin: 15px 0 25px;
            color: #ffffff;
        }

       
        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 6px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .section {
                padding: 25px;
            }

            .section h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Task: Transaction Management and Concurrency Control</h1>

        <div class="section">
            <div class="image-block">
                <div class="label">
                    <h2>Video Demonstration</h2>
                </div>

                <div class="video-wrapper">
                    <video controls>
                        <source src="./video/Task_Tran_Con.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
